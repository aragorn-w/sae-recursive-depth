# ============================================================
# SECTION 3: Depth-1 Bussmann anchor (ratio 1/21), depth-1 ONLY
# 2 level-0 archs on Gemma (6 rows) + GPT-2 Small (3 rows) = 9 rows
# Anchor experiments fire halt_and_notify if variance explained < 0.20 (relaxed 2026-04-28 from 0.50 floor; original target was Leask et al. 55.47%, observed plateau ~0.195 across 3 seeds at width=3121 — see handoffs/2026-04-28_anchor_diagnosis.md)
# The anchor runs ONLY at depth 1 because 1/21 collapses beyond depth 1
# ============================================================

- id: "gemma_jumprelu_anchor_d1_s0"
  description: "Anchor: Gemma-2-2B JumpReLU -> depth 1 meta-SAE ratio 1/4 seed 0 (16384 latents, widened from Bussmann 1/21 after VE plateau ~0.19)"
  base_model: "google/gemma-2-2b"
  level0_arch: "jumprelu"
  level0_source: "google/gemma-scope-2b-pt-res-canonical"
  site: "residual"
  layer: 12
  width: 16384
  depth: 1
  seed: 0
  dict_ratio: 0.25
  sparsity: 4
  gpu_preference: "0"
  train_steps: 90000
  enable_auxk: true
  dependencies: []
  decision_gates:
  - {metric: "variance_explained", threshold: 0.20, action: "halt_and_notify"}
  estimated_gpu_hours: 1.5
  outputs:
  - "experiments/artifacts/gemma_jumprelu_anchor_d1_s0/checkpoint.pt"
  - "experiments/artifacts/gemma_jumprelu_anchor_d1_s0/metrics.tsv"
