# EXPERIMENTS.yaml
# Locked experimental matrix for the recursive meta-SAE project.
# Source of truth for what runs. The runner iterates this file in dependency order.
# Human edits this file to add/remove experiments. Runner must not modify it.
#
# Field semantics:
#   id                 unique string, stable across commits
#   description        short human-readable label
#   base_model         huggingface model id for the base LM
#   level0_arch        jumprelu | batchtopk | none (none = flat SAE or null)
#   level0_source      huggingface id | "train_from_scratch" | "flat_sae_on_activations" | "random_gaussian" | "bartbussmann/BatchTopK"
#   site               residual | mlp_out | attn_out
#   layer              int
#   width              latent count (or d_model*ratio for recursive depths)
#   depth              0 (level-0) | 1 | 2 | 3
#   seed               int
#   dict_ratio         width at this depth divided by width at depth-1 (0.5, 0.25, 0.125, ~0.0476=1/21); null for depth 0
#   sparsity           k (BatchTopK) or target L0 (JumpReLU)
#   gpu_preference     comma-separated CUDA_VISIBLE_DEVICES values
#   dependencies       list of experiment ids that must complete before this one runs
#   decision_gates     list of {metric, threshold, action}
#   estimated_gpu_hours float
#   outputs            list of files this experiment produces
#   status             pending | running | complete | failed | skipped_by_gate
#   conditional        optional {stretch_if_time_permits: true} for Experiment 7
#
# Decision-gate actions (defined formally in SPEC.md):
#   continue_depth     proceed to next depth for this cell
#   skip_depth         mark all deeper rows for this (base_model, level0_arch, seed) as skipped_by_gate
#   skip_experiment    mark only this row as skipped_by_gate
#   halt_and_notify    stop runner immediately, ntfy urgent
#
# Units: estimated_gpu_hours are rough; see DECISIONS.md for compute budget.

meta:
  version: "1.0"
  created: "2026-04-14"
  primary_site: "residual"
  gemma_d_model: 2304
  gpt2_d_model: 768
  gemma_layer: 12
  gpt2_layer: 8
  gemma_level0_width: 65536
  gpt2_level0_width: 49152
  primary_dict_ratio: 0.25
  bussmann_ratio: 0.047619047619
  seeds: [0, 1, 2]
  batchtopk_k_level0: 60
  jumprelu_l0_target: 72
  batchtopk_k_meta: 4
  null_baseline_distribution: "isotropic_gaussian"

experiments:

# ============================================================
# SECTION 1: Level-0 training on Gemma-2-2B (BatchTopK from scratch)
# ============================================================

- id: "l0_gemma_batchtopk"
  description: "Train BatchTopK level-0 SAE on Gemma-2-2B layer 12 residual, width 65536, k=60, 500M Pile tokens"
  base_model: "google/gemma-2-2b"
  level0_arch: "batchtopk"
  level0_source: "train_from_scratch"
  site: "residual"
  layer: 12
  width: 65536
  depth: 0
  seed: 0
  dict_ratio: null
  sparsity: 60
  gpu_preference: "2"
  dependencies: []
  decision_gates:
  - {metric: "variance_explained", threshold: 0.70, action: "halt_and_notify"}
  - {metric: "dead_latent_fraction", threshold: 0.30, action: "halt_and_notify"}
  estimated_gpu_hours: 12.0
  outputs:
  - "experiments/artifacts/l0_gemma_batchtopk/checkpoint.pt"
  - "experiments/artifacts/l0_gemma_batchtopk/metrics.tsv"
  status: "pending"

# Added 2026-04-25: bartbussmann/BatchTopK does not exist on HF (404, no public
# release under that author). Train BatchTopK level-0 from scratch on GPT-2
# Small layer 8 ourselves, mirroring l0_gemma_batchtopk. The 6 GPT-2 BatchTopK
# rows below depend on this checkpoint instead of the broken HF id.
- id: "l0_gpt2_batchtopk"
  description: "Train BatchTopK level-0 SAE on GPT-2 Small layer 8 residual, width 49152, k=60, 200M Pile tokens, lr=1e-4 warmup=1000"
  base_model: "openai-community/gpt2"
  level0_arch: "batchtopk"
  level0_source: "train_from_scratch"
  site: "residual"
  layer: 8
  width: 49152
  depth: 0
  seed: 0
  dict_ratio: null
  sparsity: 60
  gpu_preference: "2"
  learning_rate: 1.0e-4
  lr_warmup_steps: 1000
  dependencies: []
  decision_gates:
  - {metric: "variance_explained", threshold: 0.70, action: "halt_and_notify"}
  - {metric: "dead_latent_fraction", threshold: 0.30, action: "halt_and_notify"}
  estimated_gpu_hours: 4.0
  outputs:
  - "experiments/artifacts/l0_gpt2_batchtopk/checkpoint.pt"
  - "experiments/artifacts/l0_gpt2_batchtopk/metrics.tsv"
  status: "pending"

